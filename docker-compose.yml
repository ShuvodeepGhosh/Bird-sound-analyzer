version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Maps a local port (default 7860) to the container's internal port 7860
      - "${LOCAL_PORT:-7860}:7860"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./birdsense.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
