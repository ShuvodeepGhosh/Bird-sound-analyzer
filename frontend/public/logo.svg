<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Premium Mint/Emerald Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40916C" />
      <stop offset="30%" stop-color="#D8F3DC" />
      <stop offset="100%" stop-color="#B7E4C7" />
    </linearGradient>
  </defs>

  <!-- Continuous Line: Bird -> Checkmark -> Text Baseline -->
  <path d="
    M 30,60
    C 40,30 70,20 90,40
    C 110,60 120,40 130,35
    L 140,40
    L 130,45
    C 120,70 90,90 60,70
    C 50,60 40,70 50,85
    L 70,105
    L 110,65
    C 120,55 130,85 150,85
    L 480,85
  " fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text resting on the baseline -->
  <text x="160" y="78" font-family="'Outfit', 'Inter', sans-serif" font-size="44" font-weight="600" fill="#F8F9FA" letter-spacing="1">ChirpCheck</text>
  
  <!-- Subtle soundwave arches indicating singing -->
  <path d="M 145,25 A 15,15 0 0,1 155,40" fill="none" stroke="#D8F3DC" stroke-width="2" stroke-linecap="round"/>
  <path d="M 155,15 A 25,25 0 0,1 170,45" fill="none" stroke="#40916C" stroke-width="2" stroke-linecap="round"/>
</svg>
